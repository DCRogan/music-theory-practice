server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to the app
    location = / {
        return 301 /music-theory-practice/;
    }

    # SPA fallback for the subpath
    location /music-theory-practice/ {
        try_files $uri $uri/ /music-theory-practice/index.html;
    }

    # Cache static assets aggressively
    location /music-theory-practice/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
